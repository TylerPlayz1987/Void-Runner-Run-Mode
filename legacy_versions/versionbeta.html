<!DOCTYPE html>
<html>
<head>
    <style>
        body { margin: 0; background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', monospace; overflow: hidden; }
        #container { position: relative; border: 4px solid #333; width: 800px; height: 400px; background: #050505; transition: border-color 0.2s; }
        canvas { display: block; }
        
        /* UI OVERLAY */
        #ui { 
            position: absolute; top: 15px; left: 15px; 
            display: flex; gap: 10px; pointer-events: none; z-index: 100; 
        }
        .stat { 
            background: rgba(0, 0, 0, 0.9); padding: 6px 15px; 
            border: 1px solid #0f0; color: #0f0; font-weight: bold; 
            font-size: 14px; border-radius: 2px;
        }
        #best-stat { color: #ff0; border-color: #ff0; }
        #death-stat { color: #f44; border-color: #f44; }

        #menu { position: absolute; width: 100%; height: 100%; top: 0; left: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: all; z-index: 200; }
        button { background: #0f0; border: none; padding: 15px 40px; font-size: 20px; font-family: inherit; font-weight: bold; cursor: pointer; border-radius: 5px; }
        button:hover { background: #fff; transform: scale(1.05); }
    </style>
</head>
<body>

<div id="container">
    <div id="ui">
        <div class="stat">LVL: <span id="lvl">1</span></div>
        <div class="stat" id="best-stat">BEST: <span id="best">1</span></div>
        <div class="stat" id="death-stat">DEATHS: <span id="deaths">0</span></div>
    </div>

    <div id="menu">
        <h1 style="color: #0f0; margin-bottom: 20px;">S3(Beta)</h1>
        <button id="startBtn">START_SYSTEM</button>
    </div>
    <canvas id="canvas"></canvas>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const container = document.getElementById('container');
const lvlTag = document.getElementById('lvl');
const bestTag = document.getElementById('best');
const deathTag = document.getElementById('deaths');
canvas.width = 800; canvas.height = 400;

let running = false;
let currentLevel = 1;
let lastCheckpoint = 1; 
let deathCount = 0;
let bestLevel = localStorage.getItem('runner_best') || 1;
bestTag.textContent = bestLevel;

let platforms = [];
const keys = {};

const player = {
    x: 50, y: 200, w: 20, h: 20,
    vx: 0, vy: 0,
    speed: 5, jump: -12,
    grounded: false
};

const goal = { x: 0, y: 0, w: 40, h: 40 };

function generateLevel() {
    platforms = [];
    platforms.push({ x: 0, y: 350, w: 150, h: 50 }); 
    
    let lastX = 150;
    let lastY = 350;

    const numPlatforms = 4 + currentLevel; 
    
    for (let i = 0; i < numPlatforms; i++) {
        let gap = 95 + Math.random() * 55;
        let vDiff = (Math.random() - 0.5) * 140;
        
        lastX += gap;
        lastY = Math.max(120, Math.min(340, lastY + vDiff));
        
        platforms.push({ x: lastX, y: lastY, w: 100, h: 15 });
        
        if (i === numPlatforms - 1) {
            goal.x = lastX + 30;
            goal.y = lastY - 45;
        }
    }
}

function reset() {
    player.x = 50; player.y = 200; player.vx = 0; player.vy = 0;
}

function update() {
    if (!running) return;

    if (keys['ArrowLeft']) player.vx = -player.speed;
    else if (keys['ArrowRight']) player.vx = player.speed;
    else player.vx *= 0.85;

    player.vy += 0.6; 

    if (keys['ArrowUp'] && player.grounded) {
        player.vy = player.jump;
        player.grounded = false;
    }

    let nextY = player.y + player.vy;
    let nextX = player.x + player.vx;
    player.grounded = false;

    for (let p of platforms) {
        if (nextX + player.w > p.x && nextX < p.x + p.w) {
            if (player.y + player.h <= p.y && nextY + player.h >= p.y) {
                player.vy = 0;
                nextY = p.y - player.h;
                player.grounded = true;
            }
        }
    }

    player.x = nextX;
    player.y = nextY;

    // WIN
    if (player.x + player.w > goal.x && player.x < goal.x + goal.w && 
        player.y + player.h > goal.y && player.y < goal.y + goal.h) {
        
        currentLevel++;
        
        // CHECKPOINT LOGIC: Trigger on reaching 10, 20, 30...
        if (currentLevel % 10 === 0) {
            lastCheckpoint = currentLevel;
            container.style.borderColor = '#00ff00'; // Neon Green
            container.style.boxShadow = '0 0 20px #00ff00';
            setTimeout(() => {
                container.style.borderColor = '#333';
                container.style.boxShadow = 'none';
            }, 400);
        }

        lvlTag.textContent = currentLevel;
        if (currentLevel > bestLevel) {
            bestLevel = currentLevel;
            bestTag.textContent = bestLevel;
            localStorage.setItem('runner_best', bestLevel);
        }
        reset();
        generateLevel();
    }

    // DEATH
    if (player.y > canvas.height) {
        deathCount++;
        deathTag.textContent = deathCount;
        
        currentLevel = lastCheckpoint;
        lvlTag.textContent = currentLevel;
        
        // Red flash
        container.style.borderColor = '#ff4444';
        setTimeout(() => container.style.borderColor = '#333', 200);
        
        reset();
        generateLevel();
    }

    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const camX = player.x - 150; 

    ctx.fillStyle = "#0f0";
    ctx.shadowBlur = 15; ctx.shadowColor = "#0f0";
    ctx.fillRect(goal.x - camX, goal.y, goal.w, goal.h);
    ctx.shadowBlur = 0;

    ctx.fillStyle = "#333";
    platforms.forEach(p => ctx.fillRect(p.x - camX, p.y, p.w, p.h));

    ctx.fillStyle = "#fff";
    ctx.fillRect(150, player.y, player.w, player.h);
}

window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e => keys[e.code] = false);

document.getElementById('startBtn').addEventListener('click', () => {
    document.getElementById('menu').style.display = 'none';
    running = true;
    generateLevel();
    update();
});
</script>
</body>
<script src="../js/data/version-data.js"></script>
<script src="../js/version-picker-legacy.js"></script>
</html>
