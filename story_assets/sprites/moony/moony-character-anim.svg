<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="96" viewBox="0 0 960 96" role="img" aria-label="Moony character sprite sheet with 10 animation frames">
  <defs>
    <g id="moonHead">
      <circle cx="0" cy="0" r="14" fill="#dbe6ff" stroke="#aebcde" stroke-width="1.4"/>
      <circle cx="5" cy="-2" r="11" fill="#0a1020"/>
      <circle cx="-4" cy="-8" r="1.2" fill="rgba(245,248,255,0.45)"/>
      <circle cx="-7" cy="1" r="0.9" fill="rgba(245,248,255,0.4)"/>
      <circle cx="-2" cy="4" r="1" fill="rgba(245,248,255,0.35)"/>
    </g>

    <g id="moonBody">
      <ellipse cx="0" cy="0" rx="11" ry="14" fill="#cfdcff" stroke="#aab7d9" stroke-width="1.2"/>
    </g>

    <g id="moonArm">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#d7e2ff" stroke-width="4" stroke-linecap="round"/>
    </g>

    <g id="moonLeg">
      <line x1="0" y1="0" x2="0" y2="13" stroke="#d5e0ff" stroke-width="4.4" stroke-linecap="round"/>
    </g>

    <g id="eyeOpen">
      <circle cx="0" cy="0" r="1.8" fill="#f5f9ff"/>
    </g>

    <g id="eyeBlink">
      <line x1="-1.8" y1="0" x2="1.8" y2="0" stroke="#f5f9ff" stroke-width="1.4" stroke-linecap="round"/>
    </g>
  </defs>

  <!-- 1 neutral -->
  <g transform="translate(48,48)">
    <use href="#moonHead" transform="translate(0,-19)"/>
    <use href="#moonBody" transform="translate(0,8)"/>
    <use href="#eyeOpen" transform="translate(-6,-21)"/>
    <use href="#eyeOpen" transform="translate(2,-20)"/>
    <line x1="-5" y1="-13" x2="0" y2="-13" stroke="#f5f9ff" stroke-width="1.2" stroke-linecap="round"/>
    <use href="#moonArm" transform="translate(-12,2) rotate(24)"/>
    <use href="#moonArm" transform="translate(12,2) rotate(-24)"/>
    <use href="#moonLeg" transform="translate(-5,20) rotate(8)"/>
    <use href="#moonLeg" transform="translate(5,20) rotate(-8)"/>
  </g>

  <!-- 2 walk left -->
  <g transform="translate(144,48)">
    <use href="#moonHead" transform="translate(0,-19)"/>
    <use href="#moonBody" transform="translate(0,8)"/>
    <use href="#eyeOpen" transform="translate(-6,-21)"/>
    <use href="#eyeOpen" transform="translate(2,-20)"/>
    <line x1="-5" y1="-13" x2="0" y2="-13" stroke="#f5f9ff" stroke-width="1.2" stroke-linecap="round"/>
    <use href="#moonArm" transform="translate(-12,2) rotate(44)"/>
    <use href="#moonArm" transform="translate(12,2) rotate(-8)"/>
    <use href="#moonLeg" transform="translate(-5,20) rotate(24)"/>
    <use href="#moonLeg" transform="translate(5,20) rotate(-24)"/>
  </g>

  <!-- 3 walk right -->
  <g transform="translate(240,48)">
    <use href="#moonHead" transform="translate(0,-19)"/>
    <use href="#moonBody" transform="translate(0,8)"/>
    <use href="#eyeOpen" transform="translate(-6,-21)"/>
    <use href="#eyeOpen" transform="translate(2,-20)"/>
    <line x1="-5" y1="-13" x2="0" y2="-13" stroke="#f5f9ff" stroke-width="1.2" stroke-linecap="round"/>
    <use href="#moonArm" transform="translate(-12,2) rotate(8)"/>
    <use href="#moonArm" transform="translate(12,2) rotate(-44)"/>
    <use href="#moonLeg" transform="translate(-5,20) rotate(-24)"/>
    <use href="#moonLeg" transform="translate(5,20) rotate(24)"/>
  </g>

  <!-- 4 blink -->
  <g transform="translate(336,48)">
    <use href="#moonHead" transform="translate(0,-19)"/>
    <use href="#moonBody" transform="translate(0,8)"/>
    <use href="#eyeBlink" transform="translate(-6,-21)"/>
    <use href="#eyeBlink" transform="translate(2,-20)"/>
    <line x1="-5" y1="-13" x2="0" y2="-13" stroke="#f5f9ff" stroke-width="1.2" stroke-linecap="round"/>
    <use href="#moonArm" transform="translate(-12,2) rotate(24)"/>
    <use href="#moonArm" transform="translate(12,2) rotate(-24)"/>
    <use href="#moonLeg" transform="translate(-5,20) rotate(8)"/>
    <use href="#moonLeg" transform="translate(5,20) rotate(-8)"/>
  </g>

  <!-- 5 wave -->
  <g transform="translate(432,48)">
    <use href="#moonHead" transform="translate(0,-19)"/>
    <use href="#moonBody" transform="translate(0,8)"/>
    <use href="#eyeOpen" transform="translate(-6,-21)"/>
    <use href="#eyeOpen" transform="translate(2,-20)"/>
    <path d="M -6 -13 Q -3 -10 0 -13" fill="none" stroke="#f5f9ff" stroke-width="1.4" stroke-linecap="round"/>
    <use href="#moonArm" transform="translate(-12,2) rotate(72)"/>
    <use href="#moonArm" transform="translate(12,2) rotate(-10)"/>
    <use href="#moonLeg" transform="translate(-5,20) rotate(10)"/>
    <use href="#moonLeg" transform="translate(5,20) rotate(-10)"/>
  </g>

  <!-- 6 jump prep -->
  <g transform="translate(528,50)">
    <use href="#moonHead" transform="translate(0,-17)"/>
    <use href="#moonBody" transform="translate(0,9) scale(1,0.9)"/>
    <use href="#eyeOpen" transform="translate(-6,-19)"/>
    <use href="#eyeOpen" transform="translate(2,-18)"/>
    <line x1="-5" y1="-12" x2="0" y2="-12" stroke="#f5f9ff" stroke-width="1.2" stroke-linecap="round"/>
    <use href="#moonArm" transform="translate(-12,4) rotate(18)"/>
    <use href="#moonArm" transform="translate(12,4) rotate(-18)"/>
    <use href="#moonLeg" transform="translate(-5,20) rotate(24)"/>
    <use href="#moonLeg" transform="translate(5,20) rotate(-24)"/>
  </g>

  <!-- 7 jump -->
  <g transform="translate(624,42)">
    <use href="#moonHead" transform="translate(0,-19)"/>
    <use href="#moonBody" transform="translate(0,8)"/>
    <use href="#eyeOpen" transform="translate(-6,-21)"/>
    <use href="#eyeOpen" transform="translate(2,-20)"/>
    <path d="M -6 -13 Q -3 -11 0 -13" fill="none" stroke="#f5f9ff" stroke-width="1.3" stroke-linecap="round"/>
    <use href="#moonArm" transform="translate(-12,0) rotate(55)"/>
    <use href="#moonArm" transform="translate(12,0) rotate(-55)"/>
    <use href="#moonLeg" transform="translate(-5,19) rotate(42)"/>
    <use href="#moonLeg" transform="translate(5,19) rotate(-42)"/>
  </g>

  <!-- 8 land -->
  <g transform="translate(720,52)">
    <use href="#moonHead" transform="translate(0,-16)"/>
    <use href="#moonBody" transform="translate(0,10) scale(1,0.86)"/>
    <use href="#eyeOpen" transform="translate(-6,-18)"/>
    <use href="#eyeOpen" transform="translate(2,-17)"/>
    <line x1="-5" y1="-11" x2="0" y2="-11" stroke="#f5f9ff" stroke-width="1.2" stroke-linecap="round"/>
    <use href="#moonArm" transform="translate(-12,5) rotate(8)"/>
    <use href="#moonArm" transform="translate(12,5) rotate(-8)"/>
    <use href="#moonLeg" transform="translate(-5,20) rotate(18)"/>
    <use href="#moonLeg" transform="translate(5,20) rotate(-18)"/>
  </g>

  <!-- 9 determined -->
  <g transform="translate(816,48)">
    <use href="#moonHead" transform="translate(0,-19)"/>
    <use href="#moonBody" transform="translate(0,8)"/>
    <ellipse cx="-6" cy="-21" rx="1.9" ry="1.5" fill="#f5f9ff"/>
    <ellipse cx="2" cy="-20" rx="1.9" ry="1.5" fill="#f5f9ff"/>
    <line x1="-8" y1="-23" x2="-4" y2="-23.8" stroke="#f5f9ff" stroke-width="1" stroke-linecap="round"/>
    <line x1="0" y1="-22.8" x2="4" y2="-23.4" stroke="#f5f9ff" stroke-width="1" stroke-linecap="round"/>
    <line x1="-5" y1="-13" x2="0" y2="-13" stroke="#f5f9ff" stroke-width="1.5" stroke-linecap="round"/>
    <use href="#moonArm" transform="translate(-12,2) rotate(12)"/>
    <use href="#moonArm" transform="translate(12,2) rotate(-12)"/>
    <use href="#moonLeg" transform="translate(-5,20) rotate(12)"/>
    <use href="#moonLeg" transform="translate(5,20) rotate(-12)"/>
  </g>

  <!-- 10 talking -->
  <g transform="translate(912,48)">
    <use href="#moonHead" transform="translate(0,-19)"/>
    <use href="#moonBody" transform="translate(0,8)"/>
    <use href="#eyeOpen" transform="translate(-6,-21)"/>
    <use href="#eyeOpen" transform="translate(2,-20)"/>
    <ellipse cx="-3" cy="-12" rx="2.4" ry="1.5" fill="#f5f9ff"/>
    <use href="#moonArm" transform="translate(-12,2) rotate(18)"/>
    <use href="#moonArm" transform="translate(12,2) rotate(-18)"/>
    <use href="#moonLeg" transform="translate(-5,20) rotate(8)"/>
    <use href="#moonLeg" transform="translate(5,20) rotate(-8)"/>
  </g>
</svg>
