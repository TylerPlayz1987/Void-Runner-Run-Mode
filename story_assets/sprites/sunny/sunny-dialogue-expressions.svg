<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="96" viewBox="0 0 960 96" role="img" aria-label="Sunny dialogue expression sprite sheet with 10 expressions">
  <defs>
    <g id="sunHead">
      <circle cx="0" cy="0" r="15" fill="#FFFF00" stroke="#e3c900" stroke-width="1.3"/>
    </g>

    <g id="sunRays" stroke="#FFFF00" stroke-width="2.2" stroke-linecap="round">
      <line x1="0" y1="-22" x2="0" y2="-27"/>
      <line x1="0" y1="22" x2="0" y2="27"/>
      <line x1="-22" y1="0" x2="-27" y2="0"/>
      <line x1="22" y1="0" x2="27" y2="0"/>
      <line x1="-15" y1="-15" x2="-19" y2="-19"/>
      <line x1="15" y1="15" x2="19" y2="19"/>
      <line x1="15" y1="-15" x2="19" y2="-19"/>
      <line x1="-15" y1="15" x2="-19" y2="19"/>
    </g>

    <g id="sunBody">
      <ellipse cx="0" cy="0" rx="11" ry="14" fill="#FFFF00" stroke="#ddc400" stroke-width="1.1"/>
    </g>

    <g id="armL">
      <line x1="0" y1="0" x2="-8" y2="9" stroke="#FFFF00" stroke-width="4" stroke-linecap="round"/>
    </g>

    <g id="armR">
      <line x1="0" y1="0" x2="8" y2="9" stroke="#FFFF00" stroke-width="4" stroke-linecap="round"/>
    </g>

    <g id="legsN">
      <line x1="-4" y1="0" x2="-5" y2="13" stroke="#FFFF00" stroke-width="4.2" stroke-linecap="round"/>
      <line x1="4" y1="0" x2="5" y2="13" stroke="#FFFF00" stroke-width="4.2" stroke-linecap="round"/>
    </g>
  </defs>

  <!-- neutral -->
  <g transform="translate(48,48)">
    <use href="#sunRays" transform="translate(0,-19) rotate(0)"/>
    <use href="#sunHead" transform="translate(0,-19)"/>
    <use href="#sunBody" transform="translate(0,8)"/>
    <use href="#armL" transform="translate(-9,2)"/>
    <use href="#armR" transform="translate(9,2)"/>
    <use href="#legsN" transform="translate(0,20)"/>
    <circle cx="-5" cy="-20" r="1.7" fill="#1a1a1a"/>
    <circle cx="5" cy="-20" r="1.7" fill="#1a1a1a"/>
    <line x1="-3" y1="-13" x2="3" y2="-13" stroke="#1a1a1a" stroke-width="1.2" stroke-linecap="round"/>
  </g>

  <!-- happy spin 1 clockwise -->
  <g transform="translate(144,48)">
    <use href="#sunRays" transform="translate(0,-19) rotate(18)"/>
    <use href="#sunHead" transform="translate(0,-19)"/>
    <use href="#sunBody" transform="translate(0,8)"/>
    <use href="#armL" transform="translate(-9,2)"/>
    <use href="#armR" transform="translate(9,2)"/>
    <use href="#legsN" transform="translate(0,20)"/>
    <circle cx="-5" cy="-20" r="1.7" fill="#1a1a1a"/>
    <circle cx="5" cy="-20" r="1.7" fill="#1a1a1a"/>
    <path d="M -5 -13 Q 0 -9 5 -13" fill="none" stroke="#1a1a1a" stroke-width="1.4" stroke-linecap="round"/>
  </g>

  <!-- happy spin 2 clockwise -->
  <g transform="translate(240,48)">
    <use href="#sunRays" transform="translate(0,-19) rotate(48)"/>
    <use href="#sunHead" transform="translate(0,-19)"/>
    <use href="#sunBody" transform="translate(0,8)"/>
    <use href="#armL" transform="translate(-9,2) rotate(-10)"/>
    <use href="#armR" transform="translate(9,2) rotate(10)"/>
    <use href="#legsN" transform="translate(0,20)"/>
    <circle cx="-5" cy="-20" r="1.9" fill="#1a1a1a"/>
    <circle cx="5" cy="-20" r="1.9" fill="#1a1a1a"/>
    <path d="M -6 -13 Q 0 -7.8 6 -13" fill="none" stroke="#1a1a1a" stroke-width="1.6" stroke-linecap="round"/>
  </g>

  <!-- happy spin 3 clockwise (fast) -->
  <g transform="translate(336,48)">
    <use href="#sunRays" transform="translate(0,-19) rotate(84)"/>
    <use href="#sunHead" transform="translate(0,-19)"/>
    <use href="#sunBody" transform="translate(0,8)"/>
    <use href="#armL" transform="translate(-9,2) rotate(-16)"/>
    <use href="#armR" transform="translate(9,2) rotate(16)"/>
    <use href="#legsN" transform="translate(0,20)"/>
    <circle cx="-5" cy="-20" r="2" fill="#1a1a1a"/>
    <circle cx="5" cy="-20" r="2" fill="#1a1a1a"/>
    <path d="M -6.5 -13 Q 0 -7 6.5 -13" fill="none" stroke="#1a1a1a" stroke-width="1.7" stroke-linecap="round"/>
  </g>

  <!-- worried -->
  <g transform="translate(432,48)">
    <use href="#sunRays" transform="translate(0,-19) rotate(10)"/>
    <use href="#sunHead" transform="translate(0,-19)"/>
    <use href="#sunBody" transform="translate(0,8)"/>
    <use href="#armL" transform="translate(-9,2) rotate(8)"/>
    <use href="#armR" transform="translate(9,2) rotate(-8)"/>
    <use href="#legsN" transform="translate(0,20)"/>
    <ellipse cx="-5" cy="-20" rx="1.9" ry="1.5" fill="#1a1a1a"/>
    <ellipse cx="5" cy="-20" rx="1.9" ry="1.5" fill="#1a1a1a"/>
    <path d="M -3.5 -11.8 Q 0 -14 3.5 -11.8" fill="none" stroke="#1a1a1a" stroke-width="1.4" stroke-linecap="round"/>
  </g>

  <!-- angry -->
  <g transform="translate(528,48)">
    <use href="#sunRays" transform="translate(0,-19) rotate(6)"/>
    <use href="#sunHead" transform="translate(0,-19)"/>
    <use href="#sunBody" transform="translate(0,8)"/>
    <use href="#armL" transform="translate(-9,2) rotate(10)"/>
    <use href="#armR" transform="translate(9,2) rotate(-10)"/>
    <use href="#legsN" transform="translate(0,20)"/>
    <circle cx="-5" cy="-20" r="1.8" fill="#1a1a1a"/>
    <circle cx="5" cy="-20" r="1.8" fill="#1a1a1a"/>
    <line x1="-8" y1="-22.8" x2="-2.8" y2="-21" stroke="#1a1a1a" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="8" y1="-22.8" x2="2.8" y2="-21" stroke="#1a1a1a" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-3" y1="-12" x2="3" y2="-12" stroke="#1a1a1a" stroke-width="1.6" stroke-linecap="round"/>
  </g>

  <!-- sad -->
  <g transform="translate(624,48)">
    <use href="#sunRays" transform="translate(0,-19) rotate(2)"/>
    <use href="#sunHead" transform="translate(0,-19)"/>
    <use href="#sunBody" transform="translate(0,8)"/>
    <use href="#armL" transform="translate(-9,2)"/>
    <use href="#armR" transform="translate(9,2)"/>
    <use href="#legsN" transform="translate(0,20)"/>
    <circle cx="-5" cy="-20" r="1.7" fill="#1a1a1a"/>
    <circle cx="5" cy="-20" r="1.7" fill="#1a1a1a"/>
    <path d="M -5 -10.8 Q 0 -15.3 5 -10.8" fill="none" stroke="#1a1a1a" stroke-width="1.4" stroke-linecap="round"/>
  </g>

  <!-- blink -->
  <g transform="translate(720,48)">
    <use href="#sunRays" transform="translate(0,-19) rotate(0)"/>
    <use href="#sunHead" transform="translate(0,-19)"/>
    <use href="#sunBody" transform="translate(0,8)"/>
    <use href="#armL" transform="translate(-9,2)"/>
    <use href="#armR" transform="translate(9,2)"/>
    <use href="#legsN" transform="translate(0,20)"/>
    <line x1="-7" y1="-20" x2="-3" y2="-20" stroke="#1a1a1a" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="3" y1="-20" x2="7" y2="-20" stroke="#1a1a1a" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="-2.6" y1="-13" x2="2.6" y2="-13" stroke="#1a1a1a" stroke-width="1.2" stroke-linecap="round"/>
  </g>

  <!-- surprised -->
  <g transform="translate(816,48)">
    <use href="#sunRays" transform="translate(0,-19) rotate(26)"/>
    <use href="#sunHead" transform="translate(0,-19)"/>
    <use href="#sunBody" transform="translate(0,8)"/>
    <use href="#armL" transform="translate(-9,2) rotate(-8)"/>
    <use href="#armR" transform="translate(9,2) rotate(8)"/>
    <use href="#legsN" transform="translate(0,20)"/>
    <circle cx="-5" cy="-20" r="2" fill="#1a1a1a"/>
    <circle cx="5" cy="-20" r="2" fill="#1a1a1a"/>
    <circle cx="0" cy="-12" r="2.1" fill="none" stroke="#1a1a1a" stroke-width="1.3"/>
  </g>

  <!-- talking -->
  <g transform="translate(912,48)">
    <use href="#sunRays" transform="translate(0,-19) rotate(34)"/>
    <use href="#sunHead" transform="translate(0,-19)"/>
    <use href="#sunBody" transform="translate(0,8)"/>
    <use href="#armL" transform="translate(-9,2)"/>
    <use href="#armR" transform="translate(9,2)"/>
    <use href="#legsN" transform="translate(0,20)"/>
    <circle cx="-5" cy="-20" r="1.7" fill="#1a1a1a"/>
    <circle cx="5" cy="-20" r="1.7" fill="#1a1a1a"/>
    <ellipse cx="0" cy="-12" rx="2.8" ry="1.8" fill="#1a1a1a"/>
  </g>
</svg>
