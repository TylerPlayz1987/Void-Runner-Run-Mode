<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="960" height="96" viewBox="0 0 960 96" role="img" aria-label="Adam dialogue expression sprite sheet with 10 expressions">
  <defs>
    <g id="adamHead">
      <circle cx="0" cy="0" r="15" fill="#ffffff" stroke="#d8d8d8" stroke-width="1.3"/>
    </g>

    <g id="adamBody">
      <ellipse cx="0" cy="0" rx="11" ry="14" fill="#f5f5f5" stroke="#d2d2d2" stroke-width="1.1"/>
    </g>

    <g id="armLeftRest">
      <line x1="0" y1="0" x2="-8" y2="9" stroke="#ececec" stroke-width="4" stroke-linecap="round"/>
    </g>

    <g id="armRightRest">
      <line x1="0" y1="0" x2="8" y2="9" stroke="#ececec" stroke-width="4" stroke-linecap="round"/>
    </g>

    <g id="legsNeutral">
      <line x1="-4" y1="0" x2="-5" y2="13" stroke="#ececec" stroke-width="4.2" stroke-linecap="round"/>
      <line x1="4" y1="0" x2="5" y2="13" stroke="#ececec" stroke-width="4.2" stroke-linecap="round"/>
    </g>
  </defs>

  <!-- Frame 1: neutral -->
  <g transform="translate(48,48)">
    <use href="#adamHead" transform="translate(0,-19)"/>
    <use href="#adamBody" transform="translate(0,8)"/>
    <use href="#armLeftRest" transform="translate(-9,2)"/>
    <use href="#armRightRest" transform="translate(9,2)"/>
    <use href="#legsNeutral" transform="translate(0,20)"/>
    <circle cx="-5" cy="-20" r="1.7" fill="#101010"/>
    <circle cx="5" cy="-20" r="1.7" fill="#101010"/>
    <line x1="-3" y1="-13" x2="3" y2="-13" stroke="#101010" stroke-width="1.3" stroke-linecap="round"/>
  </g>

  <!-- Frame 2: happy -->
  <g transform="translate(144,48)">
    <use href="#adamHead" transform="translate(0,-19)"/>
    <use href="#adamBody" transform="translate(0,8)"/>
    <use href="#armLeftRest" transform="translate(-9,2)"/>
    <use href="#armRightRest" transform="translate(9,2)"/>
    <use href="#legsNeutral" transform="translate(0,20)"/>
    <circle cx="-5" cy="-20" r="1.7" fill="#101010"/>
    <circle cx="5" cy="-20" r="1.7" fill="#101010"/>
    <path d="M -5 -13 Q 0 -8 5 -13" fill="none" stroke="#101010" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Frame 3: excited -->
  <g transform="translate(240,48)">
    <use href="#adamHead" transform="translate(0,-19)"/>
    <use href="#adamBody" transform="translate(0,8)"/>
    <use href="#armLeftRest" transform="translate(-9,2) rotate(-15)"/>
    <use href="#armRightRest" transform="translate(9,2) rotate(15)"/>
    <use href="#legsNeutral" transform="translate(0,20)"/>
    <circle cx="-5" cy="-20" r="2" fill="#101010"/>
    <circle cx="5" cy="-20" r="2" fill="#101010"/>
    <ellipse cx="0" cy="-12" rx="3.2" ry="2.4" fill="none" stroke="#101010" stroke-width="1.4"/>
  </g>

  <!-- Frame 4: worried -->
  <g transform="translate(336,48)">
    <use href="#adamHead" transform="translate(0,-19)"/>
    <use href="#adamBody" transform="translate(0,8)"/>
    <use href="#armLeftRest" transform="translate(-9,2) rotate(8)"/>
    <use href="#armRightRest" transform="translate(9,2) rotate(-8)"/>
    <use href="#legsNeutral" transform="translate(0,20)"/>
    <ellipse cx="-5" cy="-20" rx="1.9" ry="1.5" fill="#101010"/>
    <ellipse cx="5" cy="-20" rx="1.9" ry="1.5" fill="#101010"/>
    <path d="M -3.5 -11.8 Q 0 -14 3.5 -11.8" fill="none" stroke="#101010" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="-8" y1="-23" x2="-3" y2="-24.2" stroke="#101010" stroke-width="1" stroke-linecap="round"/>
    <line x1="3" y1="-24.2" x2="8" y2="-23" stroke="#101010" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- Frame 5: angry -->
  <g transform="translate(432,48)">
    <use href="#adamHead" transform="translate(0,-19)"/>
    <use href="#adamBody" transform="translate(0,8)"/>
    <use href="#armLeftRest" transform="translate(-9,2) rotate(10)"/>
    <use href="#armRightRest" transform="translate(9,2) rotate(-10)"/>
    <use href="#legsNeutral" transform="translate(0,20)"/>
    <circle cx="-5" cy="-20" r="1.8" fill="#101010"/>
    <circle cx="5" cy="-20" r="1.8" fill="#101010"/>
    <line x1="-8" y1="-22.8" x2="-2.8" y2="-21" stroke="#101010" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="8" y1="-22.8" x2="2.8" y2="-21" stroke="#101010" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="-3" y1="-12" x2="3" y2="-12" stroke="#101010" stroke-width="1.6" stroke-linecap="round"/>
  </g>

  <!-- Frame 6: sad -->
  <g transform="translate(528,48)">
    <use href="#adamHead" transform="translate(0,-19)"/>
    <use href="#adamBody" transform="translate(0,8)"/>
    <use href="#armLeftRest" transform="translate(-9,2)"/>
    <use href="#armRightRest" transform="translate(9,2)"/>
    <use href="#legsNeutral" transform="translate(0,20)"/>
    <circle cx="-5" cy="-20" r="1.7" fill="#101010"/>
    <circle cx="5" cy="-20" r="1.7" fill="#101010"/>
    <path d="M -5 -10.8 Q 0 -15.3 5 -10.8" fill="none" stroke="#101010" stroke-width="1.4" stroke-linecap="round"/>
  </g>

  <!-- Frame 7: blink/tired -->
  <g transform="translate(624,48)">
    <use href="#adamHead" transform="translate(0,-19)"/>
    <use href="#adamBody" transform="translate(0,8)"/>
    <use href="#armLeftRest" transform="translate(-9,2)"/>
    <use href="#armRightRest" transform="translate(9,2)"/>
    <use href="#legsNeutral" transform="translate(0,20)"/>
    <line x1="-7" y1="-20" x2="-3" y2="-20" stroke="#101010" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="3" y1="-20" x2="7" y2="-20" stroke="#101010" stroke-width="1.4" stroke-linecap="round"/>
    <line x1="-2.6" y1="-13" x2="2.6" y2="-13" stroke="#101010" stroke-width="1.2" stroke-linecap="round"/>
  </g>

  <!-- Frame 8: surprised -->
  <g transform="translate(720,48)">
    <use href="#adamHead" transform="translate(0,-19)"/>
    <use href="#adamBody" transform="translate(0,8)"/>
    <use href="#armLeftRest" transform="translate(-9,2) rotate(-8)"/>
    <use href="#armRightRest" transform="translate(9,2) rotate(8)"/>
    <use href="#legsNeutral" transform="translate(0,20)"/>
    <circle cx="-5" cy="-20" r="2" fill="#101010"/>
    <circle cx="5" cy="-20" r="2" fill="#101010"/>
    <circle cx="0" cy="-12" r="2.1" fill="none" stroke="#101010" stroke-width="1.3"/>
  </g>

  <!-- Frame 9: determined -->
  <g transform="translate(816,48)">
    <use href="#adamHead" transform="translate(0,-19)"/>
    <use href="#adamBody" transform="translate(0,8)"/>
    <use href="#armLeftRest" transform="translate(-9,2) rotate(5)"/>
    <use href="#armRightRest" transform="translate(9,2) rotate(-5)"/>
    <use href="#legsNeutral" transform="translate(0,20)"/>
    <ellipse cx="-5" cy="-20" rx="1.8" ry="1.5" fill="#101010"/>
    <ellipse cx="5" cy="-20" rx="1.8" ry="1.5" fill="#101010"/>
    <line x1="-8" y1="-22.2" x2="-3" y2="-22.9" stroke="#101010" stroke-width="1.1" stroke-linecap="round"/>
    <line x1="3" y1="-22.9" x2="8" y2="-22.2" stroke="#101010" stroke-width="1.1" stroke-linecap="round"/>
    <line x1="-3" y1="-12" x2="3" y2="-12" stroke="#101010" stroke-width="1.4" stroke-linecap="round"/>
  </g>

  <!-- Frame 10: talking -->
  <g transform="translate(912,48)">
    <use href="#adamHead" transform="translate(0,-19)"/>
    <use href="#adamBody" transform="translate(0,8)"/>
    <use href="#armLeftRest" transform="translate(-9,2)"/>
    <use href="#armRightRest" transform="translate(9,2)"/>
    <use href="#legsNeutral" transform="translate(0,20)"/>
    <circle cx="-5" cy="-20" r="1.7" fill="#101010"/>
    <circle cx="5" cy="-20" r="1.7" fill="#101010"/>
    <ellipse cx="0" cy="-12" rx="2.8" ry="1.8" fill="#101010"/>
  </g>
</svg>
