<!doctype html>
<html>
  <head>
    <style>
      body {
        margin: 0;
        background: #000;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: "Courier New", monospace;
        overflow: hidden;
      }

      #pauseBtn {
        display: none;
        background: #0f0;
        border: none;
        color: #000;
        padding: 5px 12px;
        cursor: pointer;
        font-weight: bold;
        margin-bottom: 5px;
        border-radius: 3px;
        z-index: 10;
        font-size: 12px;
        align-self: flex-end;
      }

      #container {
        position: relative;
        border: 4px solid #333;
        width: 800px;
        height: 400px;
        background: #050505;
        display: flex;
        flex-direction: column;
      }

      canvas {
        display: block;
        z-index: 5;
        image-rendering: pixelated;
      }

      #ui-left,
      #ui-right {
        position: absolute;
        top: 15px;
        pointer-events: none;
        z-index: 100;
      }

      #ui-left {
        left: 15px;
        display: flex;
        gap: 10px;
      }

      #ui-right {
        right: 15px;
      }

      .stat {
        background: rgba(0, 0, 0, 0.9);
        padding: 6px 15px;
        border: 1px solid #0f0;
        color: #0f0;
        font-weight: bold;
        font-size: 14px;
        border-radius: 2px;
      }

      #cp-notif {
        position: absolute;
        width: 100%;
        top: 40%;
        text-align: center;
        color: #0f0;
        font-size: 32px;
        font-weight: bold;
        opacity: 0;
        transition: opacity 0.4s;
        text-shadow: 0 0 20px #0f0;
        pointer-events: none;
        z-index: 150;
      }

      #resetConfirm,
      #timeTravelAnimation {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        background: rgba(0, 0, 0, 0.85);
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 250;
        color: #0f0;
        text-align: center;
      }

      #resetConfirm .confirm-box,
      #timeTravelAnimation .confirm-box {
        width: 320px;
        max-width: 90%;
        background: #111;
        border: 2px solid #0f0;
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      #timeTravelAnimation p {
        font-size: 22px;
        margin: 0;
        color: #0ff;
      }

      #timeTravelAnimation .time-bar {
        width: 90%;
        height: 10px;
        background: #222;
        border: 1px solid #0f0;
        overflow: hidden;
      }

      #timeTravelAnimation .time-progress {
        width: 0;
        height: 100%;
        background: #0ff;
        transition: width 0.75s ease-out;
      }

      .overlay {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        background: rgba(0, 0, 0, 0.9);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 200;
      }

      .menu-page {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        width: 340px;
        max-width: 90%;
      }

      .audio-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        width: 100%;
        align-items: start;
      }

      .audio-left,
      .audio-right {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .audio-right {
        align-items: stretch;
      }

      .audio-right button {
        width: 100%;
      }

      h1 {
        color: #0f0;
        margin-bottom: 15px;
        letter-spacing: 5px;
        font-size: 24px;
      }

      button {
        background: #0f0;
        border: none;
        padding: 12px;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
        border-radius: 5px;
        width: 100%;
      }

      .small-btn {
        padding: 8px;
        font-size: 14px;
        background: #444;
        color: #fff;
      }

      .setting-item {
        width: 100%;
        color: #0f0;
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin: 10px 0;
      }

      input[type="range"],
      select {
        width: 100%;
        background: #222;
        border: 1px solid #0f0;
        color: #0f0;
        padding: 5px;
        border-radius: 5px;
        font-family: inherit;
      }
    </style>
  </head>

  <body>
    <div style="width: 800px; display: flex; flex-direction: column">
      <button id="pauseBtn">Pause [P/Esc]</button>
      <div id="container">
        <div id="ui-left">
          <div class="stat">Level: <span id="lvl">1</span></div>
          <div
            class="stat"
            id="death-stat"
            style="color: #f44; border-color: #f44"
          >
            Deaths: <span id="deaths">0</span>
          </div>
        </div>
        <div id="ui-right">
          <div
            class="stat"
            id="best-stat"
            style="color: #ff0; border-color: #ff0"
          >
            High Score: <span id="best">1</span>
          </div>
        </div>
        <div id="cp-notif">Checkpoint Reached</div>

        <div id="resetConfirm">
          <div class="confirm-box">
            <h2>Reset Game</h2>
            <p>Choose a reset option:</p>
            <button id="checkpointRestartBtn" class="small-btn">Restart from Checkpoint</button>
            <button id="fullRestartBtn" class="small-btn">Full Restart (Level 1)</button>
            <button id="cancelResetBtn" class="small-btn">Cancel</button>
          </div>
        </div>

        <div id="timeTravelAnimation">
          <div class="confirm-box">
            <p>Rewinding time...</p>
            <div class="time-bar"><div class="time-progress" id="timeProgress"></div></div>
          </div>
        </div>

        <div id="startMenu" class="overlay">
          <h1>Void Runner</h1>
          <button id="startBtn" style="width: 200px">Start(Run Mode)</button>
        </div>
        <div id="pauseMenu" class="overlay" style="display: none">
          <div id="mainPausePage" class="menu-page">
            <h1>PAUSED</h1>
            <button id="resumeBtn">Resume</button
            ><button id="settingsBtn">Settings</button
            ><button id="cheatsBtn" style="background: #fa0">
              Cheats/Debug</button
            ><button id="restartBtn" class="small-btn">Reset</button>
          </div>
          <div id="settingsPage" class="menu-page" style="display: none">
            <h1>SETTINGS</h1>
            <button id="openAudioBtn" style="width: 100%; margin-bottom: 8px;">Audio Settings</button>
            <button id="openThemeBtn" style="width: 100%; margin-bottom: 8px;">Theme Settings</button>
            <button id="settingsBackBtn" class="small-btn" style="margin-top: 12px;">Back</button>
          </div>
          <div id="audioPage" class="menu-page" style="display: none">
            <h1>Audio</h1>
            <div class="audio-grid">
              <div class="audio-left">
                <div class="setting-item">
                  <span>Master Volume: <span id="masterValue">50%</span></span>
                  <input type="range" id="masterSlider" min="0" max="100" value="50" />
                </div>
                <div class="setting-item">
                  <span>Music Volume: <span id="musicValue">50%</span></span>
                  <input type="range" id="musicSlider" min="0" max="100" value="50" />
                </div>
                <div class="setting-item">
                  <span>SFX Volume: <span id="sfxValue">50%</span></span>
                  <input type="range" id="sfxSlider" min="0" max="100" value="50" />
                </div>
              </div>
              <div class="audio-right">
                <button id="musicMuteBtn" class="small-btn">Music: ON</button>
                <button id="sfxMuteBtn" class="small-btn">SFX: ON</button>
              </div>
            </div>
            <button id="audioBackBtn" class="small-btn" style="margin-top: 12px; width: 100%;">Back</button>
          </div>
          <div id="themePage" class="menu-page" style="display: none">
            <h1>Theme</h1>
            <div class="setting-item">
              <span>THEME</span>
              <select id="themeSelect">
                <option value="classic">Classic</option>
                <option value="sunny">Sunny</option>
                <option value="moony">Moony</option>
                <option value="toybox">Toybox</option>
                <option value="deepsea">Deep Sea</option>
                <option value="cyber">Cyber</option>
                <option value="magma">Magma</option>
                <option value="stardust">Star-Dust</option>
              </select>
            </div>
            <div class="setting-item">
              <span>8-bit Filter</span>
              <button id="retroToggleBtn" class="small-btn">8-bit: OFF</button>
            </div>
            <button id="themeBackBtn" class="small-btn" style="margin-top: 12px;">Back</button>
          </div>
          <div id="cheatsPage" class="menu-page" style="display: none">
            <h1 style="color: #fa0">CHEATS</h1>
            <button
              id="invincibleBtn"
              style="background: #fa0; margin-bottom: 5px"
            >
              Invincibility: OFF
            </button>
            <div style="display: flex; gap: 5px; width: 100%; margin-top: 10px">
              <input
                type="number"
                id="warpInput"
                placeholder="Level"
                style="
                  flex: 1;
                  background: #222;
                  border: 1px solid #fa0;
                  color: #fa0;
                  text-align: center;
                "
              /><button
                id="warpBtn"
                style="background: #fa0; width: 80px; font-size: 12px"
              >
                Warp
              </button>
            </div>
            <button
              id="cheatBackBtn"
              class="small-btn"
              style="margin-top: 20px"
            >
              Back
            </button>
          </div>
        </div>
        <canvas id="canvas"></canvas>
      </div>
    </div>
    <audio
      id="bgSunnyMusic"
      loop
      crossorigin="anonymous"
      src="Smile.ogg"
    ></audio>
    <audio
      id="bgMoonyMusic"
      loop
      crossorigin="anonymous"
      src="Dark.ogg"
    ></audio>
    <audio
      id="bgToyBoxMusic"
      loop
      crossorigin="anonymous"
      src="Funny.ogg"
    ></audio>
    <audio
      id="bgCyberMusic"
      loop
      crossorigin="anonymous"
      src="Neon.ogg"
    ></audio>
    <audio
      id="bgMagmaMusic"
      loop
      crossorigin="anonymous"
      src="Boom.ogg"
    ></audio>
    <audio
      id="bgStardustMusic"
      loop
      crossorigin="anonymous"
      src="Starry.ogg"
    ></audio>
    <audio id="bgMusic" loop crossorigin="anonymous"></audio>
    <script>
      // Entry point: run once DOM is ready
      window.onload = function () {
        // ---------------------------------------------------------------------
        // Game audio and UI state variables
        // ---------------------------------------------------------------------
        // audioCtx: Web Audio API context for generated SFX (oscillators)
        // masterVol: global volume multiplier (0.0-1.0)
        // musicVol: background music volume control (0.0-1.0)
        // sfxVol: sound effects volume control (0.0-1.0)
        // musicMuted / sfxMuted: explicit toggle state
        // isRetro8bit: state for retro low-res filter effect
        // frameCount: global frame counter for animations
        // running: whether game loop is active
        // isPaused: when true the game sim stops updating
        // currentLevel / lastCheckpoint: progression tracking
        // deathCount: player deaths shown on UI
        // cheatsUsed: toggles high-score saving checks
        // shake: camera shake amount for effects
        // winParticles: victory particle effect storage
        // flashAlpha: white flash overlay timer for checkpoints
        let audioCtx,
          masterVol = 0.5,
          musicVol = 0.5,
          sfxVol = 0.5,
          musicMuted = false,
          sfxMuted = false,
          isRetro8bit = false,
          frameCount = 0,
          running = false,
          isPaused = false,
          currentLevel = 1,
          lastCheckpoint = 1,
          deathCount = 0,
          cheatsUsed = false,
          shake = 0,
          winParticles = [],
          flashAlpha = 0;
        const canvas = document.getElementById("canvas"),
          mainCtx = canvas.getContext("2d"),
          container = document.getElementById("container"),
          cpNotif = document.getElementById("cp-notif");
        let ctx = mainCtx;
        const retroCanvas = document.createElement("canvas");
        retroCanvas.width = 160;
        retroCanvas.height = 80;
        const retroCtx = retroCanvas.getContext("2d");
        canvas.width = 800;
        canvas.height = 400;
        let bestLevel = localStorage.getItem("core_best_v20") || 1;
        document.getElementById("best").textContent = bestLevel;
        let shieldItem = null,
          wells = [],
          currentTheme = "classic",
          infiniteInvincibility = false;
        const themes = {
          classic: {
            bg: "#050505",
            plat: "#333",
            player: "#fff",
            hazards: "#f33",
            music: null,
          },
          sunny: {
            bg: "#87CEEB",
            plat: "#fff",
            player: "#FFFF00",
            hazards: "#f33",
            music: "Smile.ogg",
          },
          moony: {
            bg: "#000000",
            plat: "#D8BFD8",
            player: "#FFF",
            hazards: "#FFFF33",
            stars: true,
            music: "Dark.ogg",
          },
          toybox: {
            bg: "#ffeb3b",
            plat: "#f44336",
            player: "#2196f3",
            hazards: "#4caf50",
            music: "Funny.ogg",
          },
          deepsea: {
            bg: "#001a33",
            plat: "#2c3e50",
            player: "#f1c40f",
            hazards: "#e74c3c",
            music: "Sea.ogg",
          },
          cyber: {
            bg: "#1a0a2e",
            plat: "#0ff",
            player: "#f0f",
            hazards: "#ff0055",
            glitch: true,
            music: "Neon.ogg",
          },
          magma: {
            bg: "#1a0505",
            plat: "#111",
            player: "#ffa500",
            hazards: "#ff4500",
            glow: true,
            music: "Boom.ogg",
          },
          stardust: {
            bg: "#000033",
            plat: "#e0e0e0",
            player: "#fff",
            hazards: "#00ffcc",
            aurora: true,
            music: "Starry.ogg",
          },
        };
        // Theme particles/background add-ons (cosmetic)
        const cyberBldgs = Array.from({ length: 12 }, () => ({
          x: Math.random() * 1200,
          w: 80 + Math.random() * 60,
          h: 180 + Math.random() * 180,
          s: 0.15 + Math.random() * 0.1,
          neon: ["#f0f", "#0ff", "#f06"][Math.floor(Math.random() * 3)],
        }));
        const hoverCars = Array.from({ length: 6 }, () => ({
          x: Math.random() * 800,
          y: 150 + Math.random() * 150,
          s: 2 + Math.random() * 3,
          w: 15,
          c: ["#f0f", "#0ff"][Math.floor(Math.random() * 2)],
        }));
        const fallingStars = Array.from({ length: 3 }, () => ({
          x: Math.random() * 800,
          y: Math.random() * -400,
          s: 10 + Math.random() * 5,
          w: 3,
          l: 80 + Math.random() * 100,
        }));
        const magmaDots = Array.from({ length: 30 }, () => ({
          x: Math.random() * 800,
          y: Math.random() * 400,
          s: 1 + Math.random() * 2,
        }));
        const volcanoes = Array.from({ length: 4 }, (_, i) => ({
          x: i * 400,
          type: i % 2,
        }));
        const stars = Array.from({ length: 50 }, () => ({
          x: Math.random() * 800,
          y: Math.random() * 400,
          s: Math.random() * 2,
        }));
        // World state arrays and input map
        let platforms = [],
          hazards = [],
          keys = {},
          jumpDust = [];
        // Player state and physics
        const player = {
          x: 50,
          y: 200,
          w: 20,
          h: 20,
          vx: 0,
          vy: 0,
          momentumX: 0,
          speed: 5,
          runSpeed: 8,
          jump: -12,
          grounded: false,
          trail: [],
          hasShield: false,
          invincibleTimer: 0,
          spaghettified: false,
          deathScale: 1,
          deathRotate: 0,
          isBeingRescued: false,
          rescueTarget: null,
          stretchX: 1,
          stretchY: 1,
          coyoteTime: 0,
          jumpBuffer: 0,
        };
        let goal = { x: 0, y: 0, w: 40, h: 40 };
        function sfx(f, t, d, v, slide = 0) {
          // Generate a simple oscillator-based sound effect.
          // f: frequency in Hz, t: waveform type, d: duration seconds, v: volume gain.
          // slide: optional frequency glide target (for jump / warp chirp effects).
          try {
            if (!audioCtx) return;
            if (audioCtx.state === "suspended") audioCtx.resume();
            const o = audioCtx.createOscillator(),
              g = audioCtx.createGain();
            o.type = t;
            o.frequency.setValueAtTime(f, audioCtx.currentTime);
            if (slide)
              o.frequency.exponentialRampToValueAtTime(
                slide,
                audioCtx.currentTime + d,
              );
            const effectiveSfxVol = sfxMuted ? 0 : sfxVol * masterVol;
            g.gain.setValueAtTime(v * effectiveSfxVol, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(
              0.0001,
              audioCtx.currentTime + d,
            );
            o.connect(g);
            g.connect(audioCtx.destination);
            o.start();
            o.stop(audioCtx.currentTime + d);
          } catch (e) {}
        }
        const play = {
          jp: () => sfx(180, "square", 0.1, 0.08, 450),
          wn: () => {
            sfx(523, "triangle", 0.1, 0.1);
            setTimeout(() => sfx(659, "triangle", 0.1, 0.1), 80);
          },
          di: () => sfx(150, "sawtooth", 0.4, 0.1, 40),
          cp: () => {
            sfx(300, "sine", 1.2, 0.2, 1400);
            sfx(450, "sine", 1.2, 0.1, 1600);
          },
          well: () => sfx(60, "sine", 0.8, 0.15, 10),
          grab: () => sfx(400, "sawtooth", 0.2, 0.1, 100),
        };
        function useCheat() {
          cheatsUsed = true;
          document.getElementById("best").textContent = "CHEATS USED";
        }
        // Procedurally generate platforms/hazards for the current level
        // - resets collectible/shield state
        // - creates base ground and progressively harder obstacles
        function generateLevel() {
          shieldItem = null;
          wells = [];
          platforms = [{ x: 0, y: 350, w: 300, h: 50, isPhase: false }];
          hazards = [];
          let lx = 300,
            ly = 350;
          for (let i = 0; i < 4 + currentLevel; i++) {
            let gp = 110 + Math.random() * 80,
              vd = (Math.random() - 0.5) * 140;
            if (currentLevel >= 15 && Math.random() < 0.3)
              hazards.push({
                x: lx + gp / 2 - 10,
                y: 100,
                w: 15,
                h: 80,
                s: 2,
                dir: 1,
                r: 200,
                sy: 50,
              });
            lx += gp;
            ly = Math.max(120, Math.min(340, ly + vd));
            let isG = i === 3 + currentLevel,
              ph =
                currentLevel >= 30 &&
                !isG &&
                !platforms[platforms.length - 1].isPhase &&
                Math.random() < 0.35,
              isSink = currentLevel >= 50 && !isG && !ph && Math.random() < 0.3;
            platforms.push({
              x: lx,
              y: ly,
              w: 120,
              h: 15,
              isPhase: ph,
              isSinking: isSink,
              isTouched: false,
              hasSpike:
                currentLevel >= 10 &&
                !isG &&
                !ph &&
                !isSink &&
                Math.random() < 0.3,
              moveRange:
                currentLevel >= 20 && !isG && Math.random() < 0.4
                  ? 50 + Math.random() * 50
                  : 0,
              startX: lx,
              moveDir: 1,
              moveSpeed: 1.5,
              hasSeeker:
                currentLevel >= 40 &&
                !isG &&
                !ph &&
                !isSink &&
                Math.random() < 0.3,
              seekerX: 0,
              seekerDir: 1,
            });
            let lastP = platforms[platforms.length - 1];
            if (currentLevel >= 10 && !isG && Math.random() < 0.25)
              wells.push({
                x: lx + 60,
                y: ly - 100,
                r: 110,
                core: currentLevel >= 55 ? 10 : 0,
              });
            if (
              currentLevel >= 35 &&
              !shieldItem &&
              !isG &&
              !lastP.isPhase &&
              Math.random() < 0.2
            )
              shieldItem = {
                x: lastP.x + lastP.w / 2 - 10,
                y: lastP.y - 30,
                w: 20,
                h: 20,
                collected: false,
              };
            if (isG) {
              goal.x = lx + 40;
              goal.y = ly - 45;
            }
          }
        }
        // Handle player death and reset after falling/out of bounds/hazard hit
        function die() {
          if (player.spaghettified) return;
          shake = 15;
          deathCount++;
          document.getElementById("deaths").textContent = deathCount;
          currentLevel = lastCheckpoint;
          document.getElementById("lvl").textContent = currentLevel;
          play.di();
          container.style.borderColor = "#f44";
          setTimeout(() => (container.style.borderColor = "#333"), 200);
          generateLevel();
          player.x = 50;
          player.y = 330;
          player.vx = 0;
          player.vy = 0;
          player.trail = [];
          player.hasShield = false;
          player.invincibleTimer = 0;
          player.spaghettified = false;
          player.deathScale = 1;
          player.deathRotate = 0;
          player.isBeingRescued = false;
          player.stretchX = 1;
          player.stretchY = 1;
          player.coyoteTime = 0;
          player.jumpBuffer = 0;
        }
        function findSafePlatform() {
          let s = platforms;
          let minD = Infinity;
          platforms.forEach((p) => {
            if (!p.isPhase && !p.hasSpike && !p.hasSeeker) {
              let d = Math.abs(p.x - player.x);
              if (d < minD) {
                minD = d;
                s = p;
              }
            }
          });
          return s;
        }
        function emitJumpDust() {
          for (let i = 0; i < 12; i++) {
            jumpDust.push({
              x: player.x + player.w / 2 + (Math.random() - 0.5) * 8,
              y: player.y + player.h,
              vx: (Math.random() - 0.5) * 2.5,
              vy: -4 - Math.random() * 1.5,
              size: 2 + Math.random() * 2,
              alpha: 0.85,
              life: 18 + Math.floor(Math.random() * 8),
            });
          }
        }

        function win() {
          currentLevel++;
          document.getElementById("lvl").textContent = currentLevel;
          for (let i = 0; i < 30; i++)
            winParticles.push({
              x: goal.x + goal.w / 2,
              y: goal.y + goal.h / 2,
              vx: (Math.random() - 0.5) * 12,
              vy: (Math.random() - 0.5) * 12,
              l: 40,
            });
          if (currentLevel % 5 === 0) {
            lastCheckpoint = currentLevel;
            play.cp();
            flashAlpha = 0.5;
            cpNotif.style.opacity = "1";
            container.style.borderColor = "#0f0";
            container.style.boxShadow = "0 0 30px #0f0";
            setTimeout(() => {
              container.style.borderColor = "#333";
              container.style.boxShadow = "none";
              cpNotif.style.opacity = "0";
            }, 1500);
          } else play.wn();
          if (!cheatsUsed && currentLevel > bestLevel) {
            bestLevel = currentLevel;
            document.getElementById("best").textContent = bestLevel;

            ctx.fillRect(gx, gy + gh * 0.6, gw, gh * 0.4);
            ctx.fillStyle = "#a77b5f";
            for (let i = 0; i < 4; i++) {
              ctx.fillRect(gx + i * 12, gy + gh * 0.55, 6, gh * 0.45);
            }
            ctx.fillStyle = "#00bcd4";
            ctx.globalAlpha = 0.6;
            ctx.fillRect(gx, gy, gw, gh);
            ctx.globalAlpha = 1;
          } else if (currentTheme === "magma") {
            ctx.save();
            ctx.translate(gx + gw / 2, gy + gh / 2);
            const flame = 0.8 + Math.sin(frameCount / 10) * 0.2;
            ctx.fillStyle = `rgba(${255},${Math.floor(80 + 120*flame)},0,1)`;
            ctx.beginPath();
            ctx.moveTo(0, -gh * 0.4);
            ctx.lineTo(gw * 0.25, gh * 0.4);
            ctx.lineTo(-gw * 0.25, gh * 0.4);
            ctx.closePath();
            ctx.fill();
            ctx.restore();
          } else if (currentTheme === "cyber") {
            ctx.save();
            ctx.translate(gx + gw / 2, gy + gh / 2);
            ctx.rotate(frameCount * 0.07);
            ctx.strokeStyle = "#0ff";
            ctx.lineWidth = 3;
            ctx.fillStyle = "rgba(0,255,255,0.4)";
            ctx.beginPath();
            ctx.moveTo(0, -gh * 0.5);
            ctx.lineTo(gw * 0.5, 0);
            ctx.lineTo(0, gh * 0.5);
            ctx.lineTo(-gw * 0.5, 0);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            ctx.restore();
          } else if (currentTheme === "stardust") {
            let pulse = 0.7 + 0.3 * Math.sin(frameCount / 15);
            let rad = (gw / 2) * (1 + pulse * 0.15);
            let g = ctx.createRadialGradient(
              gx + gw / 2,
              gy + gh / 2,
              0,
              gx + gw / 2,
              gy + gh / 2,
              rad,
            );
            g.addColorStop(0, "rgba(255,255,255,0.9)");
            g.addColorStop(0.7, "rgba(180,220,255,0.7)");
            g.addColorStop(1, "rgba(80,180,255,0.1)");
            ctx.fillStyle = g;
            ctx.beginPath();
            ctx.arc(gx + gw / 2, gy + gh / 2, rad, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#fff";
            ctx.beginPath();
            ctx.arc(gx + gw / 2, gy + gh / 2, gw * 0.25, 0, Math.PI * 2);
            ctx.fill();
          } else {
            ctx.fillStyle = "#0f0";
            ctx.shadowBlur = 15;
            ctx.shadowColor = "#0f0";
            ctx.fillRect(gx, gy, gw, gh);
          }
          ctx.restore();
          winParticles.forEach((p) => {
            ctx.fillStyle = `rgba(0,255,0,${p.l / 40})`;
            ctx.fillRect(p.x - camX, p.y, 5, 5);
          });
          if (t.glow) {
            ctx.shadowBlur = 15;
            ctx.shadowColor = t.hazards;
          }
          hazards.forEach((h) => {
            ctx.fillStyle = t.hazards;
            ctx.fillRect(h.x - camX, h.y, h.w, h.h);
          });
          ctx.shadowBlur = 0;
          platforms.forEach((p) => {
            let cy = frameCount % 300,
              sol = !p.isPhase || cy < 240;
            ctx.globalAlpha = sol ? 1 : 0.1;
            if (p.isSinking) {
              ctx.fillStyle = p.isTouched ? "#444" : "#888";
              ctx.fillRect(p.x - camX, p.y, p.w, p.h);
              ctx.strokeStyle = "rgba(255,255,255,0.3)";
              ctx.beginPath();
              ctx.moveTo(p.x - camX + 10, p.y);
              ctx.lineTo(p.x - camX + 20, p.y + 8);
              ctx.moveTo(p.x - camX + 80, p.y + 2);
              ctx.lineTo(p.x - camX + 70, p.y + 12);
              ctx.stroke();
            } else {
              ctx.fillStyle =
                p.isPhase &&
                cy >= 120 &&
                cy < 240 &&
                Math.floor(frameCount / 10) % 2
                  ? "#fff"
                  : p.isPhase
                    ? "#08f"
                    : p.moveRange > 0
                      ? "#555"
                      : t.plat;
              ctx.fillRect(p.x - camX, p.y, p.w, p.h);
            }
            if (p.hasSpike || p.hasSeeker) {
              ctx.fillStyle = t.hazards;
              ctx.beginPath();
              let sx = p.hasSpike ? p.x + 52.5 : p.x + p.seekerX;
              ctx.moveTo(sx - camX, p.y);
              ctx.lineTo(sx + 7.5 - camX, p.y - 12);
              ctx.lineTo(sx + 15 - camX, p.y);
              ctx.fill();
            }
          });
          ctx.globalAlpha = 1;
          if (!player.spaghettified)
            player.trail.forEach((tr, i) => {
              ctx.globalAlpha = i / 15;
              drawPlayer(150 - (player.x - tr.x), tr.y, t.player);
            });
          ctx.globalAlpha = 1;
          drawPlayer(150, player.y, t.player);
          if (flashAlpha > 0) {
            ctx.fillStyle = `rgba(255,255,255,${flashAlpha})`;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
          }
          ctx.restore();
          ctx.fillStyle = "#fff";
          ctx.font = "12px 'Courier New',monospace";
          ctx.textAlign = "right";
          ctx.fillText("v0.5", canvas.width - 10, canvas.height - 10);
        }

        // Top-level draw entry - handles retro scaling wrapper
        // Converts main rendering to low-res offscreen buffer when 8-bit mode is enabled.
        function draw() {
          const isRetro = isRetro8bit && currentTheme === "classic";
          if (isRetro) {
            retroCtx.setTransform(1, 0, 0, 1, 0, 0);
            retroCtx.imageSmoothingEnabled = false;
            retroCtx.clearRect(0, 0, retroCanvas.width, retroCanvas.height);
            ctx = retroCtx;
            ctx.save();
            ctx.scale(0.2, 0.2);
            drawScene();
            ctx.restore();
            ctx = mainCtx;
            ctx.imageSmoothingEnabled = false;
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(
              retroCanvas,
              0,
              0,
              retroCanvas.width,
              retroCanvas.height,
              0,
              0,
              canvas.width,
              canvas.height,
            );
          } else {
            ctx = mainCtx;
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawScene();
          }
        }

        // Pause/resume and menu toggling (also handles music pause/resume)
        function toggle() {
          if (!running) return;
          isPaused = !isPaused;
          const m = document.getElementById("bgMusic");
          if (m) {
            if (isPaused) {
              m.pause();
            } else if (themes[currentTheme] && themes[currentTheme].music) {
              m.play().catch(() => {});
            }
          }
          document.getElementById("pauseMenu").style.display = isPaused
            ? "flex"
            : "none";
          document.getElementById("mainPausePage").style.display = "flex";
          document.getElementById("settingsPage").style.display = "none";
          document.getElementById("cheatsPage").style.display = "none";
        }
        document.getElementById("startBtn").onclick = () => {
          try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
          } catch (e) {}
          document.getElementById("startMenu").style.display = "none";
          document.getElementById("pauseBtn").style.display = "block";
          const m = document.getElementById("bgMusic");
          if (m && themes[currentTheme] && themes[currentTheme].music) {
            m.src = themes[currentTheme].music;
            m.volume = musicMuted ? 0 : musicVol * masterVol;
            m.play().catch(() => {});
          }
          running = true;
          generateLevel();
          (function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
          })();
        };
        document.getElementById("pauseBtn").onclick = toggle;
        document.getElementById("resumeBtn").onclick = toggle;
        document.getElementById("settingsBtn").onclick = () => {
          document.getElementById("mainPausePage").style.display = "none";
          document.getElementById("settingsPage").style.display = "flex";
          document.getElementById("audioPage").style.display = "none";
          document.getElementById("themePage").style.display = "none";
        };
        document.getElementById("openAudioBtn").onclick = () => {
          document.getElementById("settingsPage").style.display = "none";
          document.getElementById("audioPage").style.display = "flex";
        };
        document.getElementById("openThemeBtn").onclick = () => {
          document.getElementById("settingsPage").style.display = "none";
          document.getElementById("themePage").style.display = "flex";
        };
        document.getElementById("settingsBackBtn").onclick = () => {
          document.getElementById("settingsPage").style.display = "none";
          document.getElementById("mainPausePage").style.display = "flex";
        };
        document.getElementById("audioBackBtn").onclick = () => {
          document.getElementById("audioPage").style.display = "none";
          document.getElementById("settingsPage").style.display = "flex";
        };
        document.getElementById("themeBackBtn").onclick = () => {
          document.getElementById("themePage").style.display = "none";
          document.getElementById("settingsPage").style.display = "flex";
        };
        document.getElementById("cheatsBtn").onclick = () => {
          document.getElementById("mainPausePage").style.display = "none";
          document.getElementById("cheatsPage").style.display = "flex";
        };
        document.getElementById("cheatBackBtn").onclick = () => {
          document.getElementById("cheatsPage").style.display = "none";
          document.getElementById("mainPausePage").style.display = "flex";
        };

        function hideResetPrompt() {
          document.getElementById("resetConfirm").style.display = "none";
          document.getElementById("mainPausePage").style.display = "flex";
        }

        function showResetPrompt() {
          document.getElementById("mainPausePage").style.display = "none";
          document.getElementById("resetConfirm").style.display = "flex";
        }

        function respawnPlayer() {
          player.x = 50;
          player.y = 200;
          player.vx = 0;
          player.vy = 0;
          player.trail = [];
          player.hasShield = false;
          player.invincibleTimer = 0;
          player.spaghettified = false;
          player.deathScale = 1;
          player.deathRotate = 0;
          player.isBeingRescued = false;
          player.rescueTarget = null;
          player.stretchX = 1;
          player.stretchY = 1;
          player.coyoteTime = 0;
          player.jumpBuffer = 0;
        }

        function applyDefaults() {
          masterVol = 0.5;
          musicVol = 0.5;
          sfxVol = 0.5;
          musicMuted = false;
          sfxMuted = false;
          isRetro8bit = false;
          infiniteInvincibility = false;
          currentTheme = "classic";
          document.getElementById("masterSlider").value = 50;
          document.getElementById("musicSlider").value = 50;
          document.getElementById("sfxSlider").value = 50;
          document.getElementById("masterValue").textContent = "50%";
          document.getElementById("musicValue").textContent = "50%";
          document.getElementById("sfxValue").textContent = "50%";
          document.getElementById("musicMuteBtn").textContent = "Music: ON";
          document.getElementById("sfxMuteBtn").textContent = "SFX: ON";
          document.getElementById("themeSelect").value = "classic";
          document.getElementById("retroToggleBtn").textContent = "8-bit: OFF";
          document.getElementById("invincibleBtn").textContent = "Invincibility: OFF";
          const m = document.getElementById("bgMusic");
          if (m) {
            if (themes[currentTheme].music) {
              m.src = themes[currentTheme].music;
              m.volume = musicVol * masterVol;
              m.play().catch(() => {});
            } else {
              m.pause();
            }
          }
        }

        function checkpointRestart() {
          currentLevel = lastCheckpoint;
          document.getElementById("lvl").textContent = currentLevel;
          generateLevel();
          respawnPlayer();
          isPaused = false;
          document.getElementById("pauseMenu").style.display = "none";
          hideResetPrompt();
        }

        function fullRestart() {
          lastCheckpoint = 1;
          currentLevel = 1;
          deathCount = 0;
          document.getElementById("deaths").textContent = deathCount;
          document.getElementById("lvl").textContent = currentLevel;
          applyDefaults();
          generateLevel();
          respawnPlayer();
          isPaused = false;
          document.getElementById("pauseMenu").style.display = "none";
          hideResetPrompt();
          document.getElementById("timeTravelAnimation").style.display = "flex";
          const progress = document.getElementById("timeProgress");
          progress.style.width = "0";
          setTimeout(() => {
            progress.style.width = "100%";
          }, 20);
          setTimeout(() => {
            document.getElementById("timeTravelAnimation").style.display = "none";
          }, 900);
        }

        document.getElementById("restartBtn").onclick = showResetPrompt;
        document.getElementById("cancelResetBtn").onclick = hideResetPrompt;
        document.getElementById("checkpointRestartBtn").onclick = checkpointRestart;
        document.getElementById("fullRestartBtn").onclick = fullRestart;

        document.getElementById("masterSlider").oninput = (e) => {
          masterVol = e.target.value / 100;
          document.getElementById("masterValue").textContent =
            e.target.value + "%";
          const m = document.getElementById("bgMusic");
          if (m) {
            m.volume = musicMuted ? 0 : musicVol * masterVol;
          }
        };
        document.getElementById("musicSlider").oninput = (e) => {
          musicVol = e.target.value / 100;
          document.getElementById("musicValue").textContent =
            e.target.value + "%";
          const m = document.getElementById("bgMusic");
          if (m) {
            m.volume = musicMuted ? 0 : musicVol * masterVol;
          }
          if (musicMuted && musicVol > 0 && masterVol > 0) {
            // auto-unmute if user adjusts the music slider
            musicMuted = false;
            document.getElementById("musicMuteBtn").textContent = "Music: ON";
          }
        };
        document.getElementById("sfxSlider").oninput = (e) => {
          sfxVol = e.target.value / 100;
          document.getElementById("sfxValue").textContent =
            e.target.value + "%";
          if (sfxMuted && sfxVol > 0 && masterVol > 0) {
            sfxMuted = false;
            document.getElementById("sfxMuteBtn").textContent = "SFX: ON";
          }
        };
        document.getElementById("musicMuteBtn").onclick = () => {
          musicMuted = !musicMuted;
          document.getElementById("musicMuteBtn").textContent =
            "Music: " + (musicMuted ? "OFF" : "ON");
          const m = document.getElementById("bgMusic");
          if (m) {
            m.volume = musicMuted ? 0 : musicVol * masterVol;
          }
        };
        document.getElementById("sfxMuteBtn").onclick = () => {
          sfxMuted = !sfxMuted;
          document.getElementById("sfxMuteBtn").textContent =
            "SFX: " + (sfxMuted ? "OFF" : "ON");
        };
        document.getElementById("themeSelect").onchange = (e) => {
          currentTheme = e.target.value;
          const m = document.getElementById("bgMusic");
          if (m && themes[currentTheme] && themes[currentTheme].music) {
            m.src = themes[currentTheme].music;
            m.volume = musicMuted ? 0 : musicVol * masterVol;
            if (running || currentTheme === "sunny") {
              m.play().catch(() => {});
            } else {
              m.pause();
            }
          } else if (m) {
            m.pause();
          }
        };
        document.getElementById("retroToggleBtn").onclick = () => {
          isRetro8bit = !isRetro8bit;
          document.getElementById("retroToggleBtn").textContent =
            "8-bit: " + (isRetro8bit ? "ON" : "OFF");
        };
        document.getElementById("invincibleBtn").onclick = () => {
          infiniteInvincibility = !infiniteInvincibility;
          document.getElementById("invincibleBtn").textContent =
            "Invincibility: " + (infiniteInvincibility ? "ON" : "OFF");
          useCheat();
          play.wn();
        };
        document.getElementById("warpBtn").onclick = () => {
          let v = parseInt(document.getElementById("warpInput").value);
          if (v > 0) {
            currentLevel = v;
            lastCheckpoint = v;
            document.getElementById("lvl").textContent = v;
            isPaused = false;
            document.getElementById("pauseMenu").style.display = "none";
            useCheat();
            die();
          }
        };
        function submenuBack() {
          const settingsPage = document.getElementById("settingsPage");
          const audioPage = document.getElementById("audioPage");
          const themePage = document.getElementById("themePage");
          const cheatsPage = document.getElementById("cheatsPage");

          if (audioPage.style.display === "flex" || themePage.style.display === "flex") {
            audioPage.style.display = "none";
            themePage.style.display = "none";
            settingsPage.style.display = "flex";
            return true;
          }

          if (cheatsPage.style.display === "flex") {
            cheatsPage.style.display = "none";
            settingsPage.style.display = "flex";
            return true;
          }

          if (settingsPage.style.display === "flex") {
            settingsPage.style.display = "none";
            document.getElementById("mainPausePage").style.display = "flex";
            return true;
          }

          return false;
        }

        window.onkeydown = (e) => {
          keys[e.code] = 1;
          if (e.code === "KeyP" || e.code === "Escape") {
            if (document.getElementById("pauseMenu").style.display === "flex") {
              if (submenuBack()) return;
            }
            toggle();
          }
          if (
            [
              "ArrowUp",
              "ArrowDown",
              "ArrowLeft",
              "ArrowRight",
              "ShiftLeft",
              "ShiftRight",
              "KeyW",
              "KeyA",
              "KeyS",
              "KeyD",
              "Space",
            ].includes(e.code)
          )
            e.preventDefault();
        };
        window.onkeyup = (e) => (keys[e.code] = 0);
      };
    </script>
  </body>
</html>
